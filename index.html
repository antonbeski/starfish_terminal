<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>STARFISH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    :root {
      --bg:        #000;
      --surface:   #0c0c0c;
      --surface-2: #111;
      --border:    #1e1e1e;
      --border-hi: #2e2e2e;
      --text:      #f0f0f0;
      --text-2:    #777;
      --text-3:    #3a3a3a;
      --green:     #3ddc84;
      --red:       #ff5f57;
      --r:         10px;
      --r-sm:      7px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 2px 7px 2px 7px;
      border-radius: 4px;
    }

    .header-right {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 20px 24px 40px;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Controls */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    input, select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      padding: 9px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      width: 100%;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
      appearance: none;
      height: 38px;
    }

    input::placeholder { color: var(--text-3); }

    input:focus, select:focus {
      border-color: var(--border-hi);
      background: #161616;
    }

    .select-wrap { position: relative; }

    .select-wrap::after {
      content: '';
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid var(--text-3);
    }

    select { padding-right: 28px; cursor: pointer; }
    select option { background: #111; color: #eee; }

    .btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--r-sm);
      padding: 0 20px;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); opacity: 1; }

    /* Chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.67rem;
      letter-spacing: 0.04em;
      padding: 4px 11px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-2);
      background: transparent;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      user-select: none;
    }

    .chip:hover { border-color: var(--border-hi); color: var(--text); }
    .chip.active { background: var(--text); border-color: var(--text); color: var(--bg); font-weight: 500; }

    /* Chart */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .chart-inner { padding: 4px 2px 2px; }

    /* States */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 10px;
    }

    .empty-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-2);
    }

    .empty-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.67rem;
      color: var(--text-3);
      text-align: center;
      max-width: 260px;
      line-height: 1.7;
    }

    .error-state {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 18px 20px;
      margin: 16px;
      background: rgba(255,95,87,0.05);
      border: 1px solid rgba(255,95,87,0.15);
      border-radius: var(--r-sm);
    }

    .error-state svg { flex-shrink: 0; margin-top: 1px; }

    .error-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.76rem;
      color: var(--red);
      line-height: 1.65;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .controls   { animation: fadeUp 0.3s ease both; }
    .chart-wrap { animation: fadeUp 0.3s 0.07s ease both; }

    /* Responsive */
    @media (max-width: 860px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .btn-wrap { grid-column: span 2; }
      .btn { width: 100%; }
    }

    @media (max-width: 540px) {
      .header { padding: 15px 16px; }
      .content { padding: 14px 14px 32px; }
      .controls { padding: 14px; }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .btn-wrap { grid-column: span 1; }
      .btn { width: 100%; }

      .logo-tag { display: none; }
      .header-right { display: none; }

      .empty-state { padding: 56px 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <span class="logo">Starfish</span>
      <span class="logo-tag">Markets</span>
    </div>
    <span class="header-right">US &amp; NSE</span>
  </header>

  <div class="content">

    <div class="controls">
      <form method="POST" action="/">
        <div class="form-grid">

          <div class="field">
            <span class="field-label">Symbol</span>
            <input id="ticker" name="ticker" type="text"
              value="{{ ticker }}"
              placeholder="AAPL, TCS.NS ..."
              required autocomplete="off" spellcheck="false"/>
          </div>

          <div class="field">
            <span class="field-label">Range</span>
            <div class="select-wrap">
              <select id="period" name="period">
                {% for p in periods %}
                  <option value="{{ p.value }}" {% if p.value == period %}selected{% endif %}>{{ p.label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="field">
            <span class="field-label">Chart</span>
            <div class="select-wrap">
              <select id="chart_type" name="chart_type">
                <option value="candlestick" {% if chart_type == 'candlestick' %}selected{% endif %}>Candlestick</option>
                <option value="line" {% if chart_type == 'line' %}selected{% endif %}>Line</option>
              </select>
            </div>
          </div>

          <div class="btn-wrap">
            <button type="submit" class="btn">Load</button>
          </div>
        </div>

        <div class="chips">
          {% for stock in popular_stocks %}
            <span class="chip {% if stock.symbol == ticker %}active{% endif %}"
              onclick="setTicker('{{ stock.symbol }}')"
            >{{ stock.symbol }}</span>
          {% endfor %}
        </div>
      </form>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      {% if error %}
        <div class="error-state">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#ff5f57" stroke-width="1.3"/>
            <path d="M8 4.8v3.6M8 10.5v.7" stroke="#ff5f57" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <div class="error-msg">{{ error }}</div>
        </div>
      {% elif graph %}
        <div class="chart-inner">{{ graph|safe }}</div>
      {% else %}
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="#3a3a3a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="empty-title">No data loaded</div>
          <div class="empty-hint">Enter a ticker and press Load to view the chart</div>
        </div>
      {% endif %}
    </div>

  </div>
</div>

<script>
  function setTicker(s) {
    document.getElementById('ticker').value = s;
    document.querySelector('form').submit();
  }
  document.getElementById('ticker').addEventListener('input', function() {
    var p = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(p, p);
  });
</script>
</body>
</html>
