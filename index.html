<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockChart — Live Stock Charts</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.5px;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: #8b949e;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* ── Control Panel ── */
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
      margin-bottom: 16px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 700px) {
      form { grid-template-columns: 1fr 1fr; }
      form .btn-search { grid-column: span 2; }
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }

    select option { background: #161b22; }

    .btn-search {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-search:hover { background: #2ea043; }
    .btn-search:active { transform: scale(0.97); }

    /* ── Quick tickers ── */
    .quick-tickers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #8b949e;
      transition: all 0.2s;
    }

    .chip:hover, .chip.active {
      background: #58a6ff;
      border-color: #58a6ff;
      color: #0d1117;
      font-weight: 600;
    }

    /* ── Chart Card ── */
    .chart-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 16px;
      overflow: hidden;
    }

    .error-box {
      background: #2d1b1b;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 16px 20px;
      color: #f85149;
      font-size: 0.95rem;
    }

    .chart-wrapper { width: 100%; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">📈 StockChart</div>
    <div class="subtitle">Live stock charts — US &amp; NSE markets</div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-title">Search</div>

    <form method="POST" action="/">
      <div>
        <label for="ticker">Ticker Symbol</label>
        <input
          id="ticker"
          name="ticker"
          type="text"
          value="{{ ticker }}"
          placeholder="e.g. AAPL, GOOGL, TCS.NS"
          required
        />
      </div>

      <div>
        <label for="period">Time Range</label>
        <select id="period" name="period">
          {% for p in periods %}
            <option value="{{ p.value }}" {% if p.value == period %}selected{% endif %}>
              {{ p.label }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="chart_type">Chart Type</label>
        <select id="chart_type" name="chart_type">
          <option value="candlestick" {% if chart_type == 'candlestick' %}selected{% endif %}>🕯 Candlestick</option>
          <option value="line" {% if chart_type == 'line' %}selected{% endif %}>📉 Line</option>
        </select>
      </div>

      <button type="submit" class="btn-search">Search →</button>
    </form>

    <div class="quick-tickers">
      {% for stock in popular_stocks %}
        <span
          class="chip {% if stock.symbol == ticker %}active{% endif %}"
          onclick="setTicker('{{ stock.symbol }}')"
          title="{{ stock.name }}"
        >{{ stock.symbol }}</span>
      {% endfor %}
    </div>
  </div>

  <div class="chart-card">
    {% if error %}
      <div class="error-box">⚠️ {{ error }}</div>
    {% elif graph %}
      <div class="chart-wrapper">{{ graph|safe }}</div>
    {% endif %}
  </div>
</main>

<script>
  function setTicker(symbol) {
    document.getElementById('ticker').value = symbol;
    document.querySelector('form').submit();
  }
</script>
</body>
</html>
